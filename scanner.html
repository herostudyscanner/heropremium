<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hero Scanner PRO | Ultra</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap');
        :root {
            --bg-color: #020617; --glass-bg: rgba(15, 23, 42, 0.4);
            --primary: #6366f1; --danger: #ef4444; --text-main: #f8fafc;
        }
        body { background: var(--bg-color); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; background: var(--glass-bg); padding: 5px; border-radius: 12px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; background: transparent; color: #94a3b8; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; }
        
        .panel { display: none; background: var(--glass-bg); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); }
        .panel.active { display: block; }
        
        .btn-ghost { width: 100%; padding: 15px; background: linear-gradient(45deg, #ef4444, #991b1b); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4); }
        .btn-ghost:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="tabs">
        <button class="tab-btn active" id="btn-scan" onclick="switchTab('scan')">Skaner</button>
        <button class="tab-btn" id="btn-premium" onclick="switchTab('premium')">Arvoh Davomat</button>
    </div>

    <div id="scan-tab" class="panel active">
        <h2>QR Skaner</h2>
        <p>Tez orada bu yerga kameradan o'qish imkoniyati qo'shiladi...</p>
    </div>

    <div id="premium-tab" class="panel">
        <h2>👻 Arvoh Davomat</h2>
        <p>Agar siz darsda bo'lmasangiz, bu tugma orqali darsdagi talabalardan QR kodni tasdiqlab yuborishni so'rashingiz mumkin.</p>
        <button class="btn-ghost" onclick="ghostScan()">YORDAM SO'RASH</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function switchTab(tab) {
            document.getElementById('scan-tab').style.display = tab === 'scan' ? 'block' : 'none';
            document.getElementById('premium-tab').style.display = tab === 'premium' ? 'block' : 'none';
            document.getElementById('btn-scan').classList.toggle('active', tab === 'scan');
            document.getElementById('btn-premium').classList.toggle('active', tab === 'premium');
        }

        async function ghostScan() {
            // Eng muhim o'zgarish: Telegram ID ni to'g'ridan-to'g'ri olish
            const tgUser = tg.initDataUnsafe?.user;
            const tgId = tgUser ? tgUser.id : null;
            
            if(!tgId) {
                tg.showAlert("Telegram ma'lumotlari topilmadi. Iltimos panelni bot ichidan oching.");
                return;
            }

            tg.showConfirm("Siz rostdan ham darsda emassiz va yordam so'ramoqchimisiz?", async (ok) => {
                if(ok) {
                    tg.showAlert("👻 So'rov yuborilmoqda...");
                    try {
                        const r = await fetch('/api/ghost_scan', { 
                            method: 'POST', 
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ telegram_id: tgId }) 
                        });
                        const res = await r.json();
                        if(res.status === 'success') {
                            tg.showAlert("✅ " + res.message);
                        } else {
                            // Agar Premium bo'lmasa, ogohlantirish chiqariladi
                            tg.showAlert("❌ " + res.message + "\n\nBotdan /premium komandasini yuboring.");
                        }
                    } catch(e) { tg.showAlert("Xatolik: Serverga ulanib bo'lmadi!"); }
                }
            });
        }
    </script>
</body>
</html>
